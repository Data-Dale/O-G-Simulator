<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <title>Treehouse</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- ── SIDEBAR NAVIGATION ── -->
  <nav id="sidebar" aria-label="Main navigation">
    <div class="sidebar-brand">
      <span class="brand-tree" aria-hidden="true">🌳</span>
      <span class="brand-name">Treehouse</span>
    </div>
    <div class="nav-items" role="tablist">
      <button class="nav-item active" data-screen="home" role="tab" aria-selected="true" aria-label="Home">
        <span class="nav-icon" aria-hidden="true">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-screen="calendar" role="tab" aria-selected="false" aria-label="Calendar">
        <span class="nav-icon" aria-hidden="true">📅</span>
        <span class="nav-label">Calendar</span>
      </button>
      <button class="nav-item" data-screen="tasks" role="tab" aria-selected="false" aria-label="Tasks">
        <span class="nav-icon" aria-hidden="true">✅</span>
        <span class="nav-label">Tasks</span>
      </button>
      <button class="nav-item" data-screen="meals" role="tab" aria-selected="false" aria-label="Meals">
        <span class="nav-icon" aria-hidden="true">🍽️</span>
        <span class="nav-label">Meals</span>
      </button>
      <button class="nav-item" data-screen="lists" role="tab" aria-selected="false" aria-label="Lists">
        <span class="nav-icon" aria-hidden="true">📋</span>
        <span class="nav-label">Lists</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <button class="nav-item" id="admin-btn" aria-label="Admin settings">
        <span class="nav-icon" aria-hidden="true">⚙️</span>
        <span class="nav-label">Admin</span>
      </button>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ── -->
  <main id="main">

    <!-- Member bar + clock -->
    <header id="topbar">
      <div id="member-selector" role="group" aria-label="Select family member"></div>
      <div id="topbar-right">
        <div id="weather-widget"></div>
        <div id="clock-display" aria-live="polite" aria-label="Current time"></div>
      </div>
    </header>

    <!-- Screens -->
    <div id="screen-home"     class="screen active"  role="tabpanel"></div>
    <div id="screen-calendar" class="screen"         role="tabpanel"></div>
    <div id="screen-tasks"    class="screen"         role="tabpanel"></div>
    <div id="screen-meals"    class="screen"         role="tabpanel"></div>
    <div id="screen-lists"    class="screen"         role="tabpanel"></div>
    <div id="screen-admin"    class="screen"         role="tabpanel"></div>

  </main>

  <!-- ── SCREENSAVER ── -->
  <div id="screensaver" class="hidden" aria-hidden="true">
    <div id="screensaver-bg"></div>
    <div id="screensaver-overlay">
      <div id="screensaver-time"></div>
      <div id="screensaver-date"></div>
      <div id="screensaver-family">The Naughton Family 🌳</div>
    </div>
    <div id="screensaver-photos"></div>
  </div>

  <!-- ── CELEBRATION OVERLAY ── -->
  <div id="celebration" class="hidden" aria-hidden="true" role="status">
    <canvas id="confetti-canvas"></canvas>
    <div id="celebration-inner">
      <div id="celebration-emoji"></div>
      <div id="celebration-title"></div>
      <div id="celebration-xp"></div>
      <button id="celebration-close" aria-label="Close celebration">Woo hoo! 🎉</button>
    </div>
  </div>

  <!-- ── MODAL ── -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal-box">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close" aria-label="Close">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ── ADMIN PIN GATE ── -->
  <div id="pin-overlay" class="hidden" role="dialog" aria-modal="true" aria-label="Admin PIN entry">
    <div id="pin-box">
      <div id="pin-icon" aria-hidden="true">🔒</div>
      <h2>Admin Access</h2>
      <div id="pin-dots" aria-label="PIN digits entered">
        <span class="pin-dot"></span><span class="pin-dot"></span>
        <span class="pin-dot"></span><span class="pin-dot"></span>
      </div>
      <div id="pin-error" aria-live="polite"></div>
      <div id="pin-pad">
        <button class="pin-key" data-digit="1">1</button>
        <button class="pin-key" data-digit="2">2</button>
        <button class="pin-key" data-digit="3">3</button>
        <button class="pin-key" data-digit="4">4</button>
        <button class="pin-key" data-digit="5">5</button>
        <button class="pin-key" data-digit="6">6</button>
        <button class="pin-key" data-digit="7">7</button>
        <button class="pin-key" data-digit="8">8</button>
        <button class="pin-key" data-digit="9">9</button>
        <button class="pin-key pin-key-clear" id="pin-clear">⌫</button>
        <button class="pin-key" data-digit="0">0</button>
        <button class="pin-key pin-key-cancel" id="pin-cancel">✕</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
